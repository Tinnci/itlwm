name: itlwm CI/CD

run-name: itlwm CI/CD - ${{ github.event_name }} - ${{ github.ref_name }}

on:
  push:
    branches: master
  pull_request:
  workflow_dispatch:
    inputs:
      publish_prerelease:
        description: 'Publish an immutable alpha prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  BUILD_OUTPUT: 'build/Build/Products/Debug'
  ARTIFACT_DIR: 'release-artifacts'

jobs:
  build_package:
    name: Build, Package, and Checksum
    runs-on: macos-latest
    permissions:
      contents: read
    outputs:
      itlwm_ver: ${{ steps.version.outputs.itlwm_ver }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_version: ${{ steps.version.outputs.release_version }}
      release_name: ${{ steps.version.outputs.release_name }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      publish_prerelease: ${{ steps.version.outputs.publish_prerelease }}

    steps:
    - uses: actions/checkout@v6.0.3
      with:
        fetch-depth: 0

    - name: Resolve Version and Release Mode
      id: version
      env:
        MANUAL_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_prerelease }}
        HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
      run: |
        set -euo pipefail

        GIT_SHA="$(git rev-parse --short HEAD)"
        MODULE_VERSION="$(awk -F'= ' '/MODULE_VERSION =/ {gsub(/[; \t]/, "", $2); print $2; exit}' itlwm.xcodeproj/project.pbxproj)"
        ALPHA_ID="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}.${GIT_SHA}"
        RELEASE_VERSION="${MODULE_VERSION}-alpha.${ALPHA_ID}"
        RELEASE_TAG="v${RELEASE_VERSION}"
        RELEASE_NAME="itlwm ${RELEASE_VERSION}"
        PUBLISH_PRERELEASE=false
        SKIP_RELEASE=false

        if [[ "${HEAD_COMMIT_MESSAGE}" == *"[skip release]"* || "${HEAD_COMMIT_MESSAGE}" == *"[release skip]"* || "${HEAD_COMMIT_MESSAGE}" == *"[ci-only]"* ]]; then
          SKIP_RELEASE=true
        fi

        if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "master" && "${HEAD_COMMIT_MESSAGE}" != *"Bump version"* && "${SKIP_RELEASE}" == "false" ]]; then
          PUBLISH_PRERELEASE=true
        elif [[ "${MANUAL_PRERELEASE}" == "true" ]]; then
          PUBLISH_PRERELEASE=true
        fi

        if [[ "${PUBLISH_PRERELEASE}" == "true" ]]; then
          DRIVER_SUFFIX="_alpha.${ALPHA_ID}"
          RELEASE_CHANNEL="alpha"
        else
          DRIVER_SUFFIX="_${GIT_SHA}"
          RELEASE_CHANNEL="development"
        fi

        {
          echo "SHORT_SHA=${GIT_SHA}"
          echo "ITLWM_VER=${MODULE_VERSION}"
          echo "RELEASE_VERSION=${RELEASE_VERSION}"
          echo "RELEASE_TAG=${RELEASE_TAG}"
          echo "RELEASE_NAME=${RELEASE_NAME}"
          echo "DRIVER_SUFFIX=${DRIVER_SUFFIX}"
          echo "RELEASE_CHANNEL=${RELEASE_CHANNEL}"
        } >> "${GITHUB_ENV}"

        {
          echo "short_sha=${GIT_SHA}"
          echo "itlwm_ver=${MODULE_VERSION}"
          echo "release_version=${RELEASE_VERSION}"
          echo "release_tag=${RELEASE_TAG}"
          echo "release_name=${RELEASE_NAME}"
          echo "publish_prerelease=${PUBLISH_PRERELEASE}"
        } >> "${GITHUB_OUTPUT}"

    - name: Install MacKernelSDK
      run: |
        git clone --depth=1 https://github.com/acidanthera/MacKernelSDK.git

    - name: Build itlwm.kext
      run: |
        xcodebuild -scheme itlwm -configuration Debug -derivedDataPath build \
          GIT_COMMIT="${DRIVER_SUFFIX}" \
          OIW_RELEASE_CHANNEL="${RELEASE_CHANNEL}" \
          OIW_RELEASE_VERSION="${RELEASE_VERSION}" \
          OIW_BUILD_COMMIT="${SHORT_SHA}" \
          | xcpretty && exit "${PIPESTATUS[0]}"

    - name: Build AirportItlwm.kext Variants
      run: |
        xcodebuild -scheme "AirportItlwm (all)" -configuration Debug -derivedDataPath build \
          GIT_COMMIT="${DRIVER_SUFFIX}" \
          OIW_RELEASE_CHANNEL="${RELEASE_CHANNEL}" \
          OIW_RELEASE_VERSION="${RELEASE_VERSION}" \
          OIW_BUILD_COMMIT="${SHORT_SHA}" \
          | xcpretty && exit "${PIPESTATUS[0]}"

    - name: Package Kext Artifacts
      run: |
        set -euo pipefail
        mkdir -p "${ARTIFACT_DIR}"

        cd "${BUILD_OUTPUT}"
          zip -qr "${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/itlwm-v${RELEASE_VERSION}-DEBUG.zip" itlwm.kext
          while IFS= read -r tgt ; do
            zip -qr "${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/AirportItlwm-${tgt// /_}-v${RELEASE_VERSION}-DEBUG.zip" "${tgt}"
          done < <(find . -mindepth 1 -maxdepth 1 -type d ! -name "*.kext" | cut -c 3-)
        cd "${GITHUB_WORKSPACE}/${ARTIFACT_DIR}"
        shasum -a 256 -- ./*.zip > SHA256SUMS

    - name: Write Alpha Release Notes
      if: steps.version.outputs.publish_prerelease == 'true'
      run: |
        {
          echo "# ${RELEASE_NAME}"
          echo
          echo '### Disclaimer:'
          echo '***This alpha version is for testing only.***'
          echo 'It is not ready for daily use and we do not guarantee its usability.'
          echo 'If you discovered an issue and you do not have debugging skills, please check with the [Gitter Chat Room](https://gitter.im/OpenIntelWireless/itlwm) in advance before opening an Issue.'
          echo
          echo "Commit: \`${GITHUB_SHA}\`"
          echo
          echo '### The latest five updates are:'
        } > "${ARTIFACT_DIR}/ReleaseNotes.md"
        git log -"5" --format="- %H %s" | sed '/^$/d' >> "${ARTIFACT_DIR}/ReleaseNotes.md"

    - name: Upload Packaged Artifacts
      if: steps.version.outputs.publish_prerelease == 'true'
      uses: actions/upload-artifact@v7.0.1
      with:
        name: release-artifacts
        path: ${{ env.ARTIFACT_DIR }}/*
        if-no-files-found: error
        retention-days: 30

  publish_alpha:
    name: Publish Alpha Prerelease
    needs: build_package
    if: needs.build_package.outputs.publish_prerelease == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
    - uses: actions/checkout@v6.0.3
      with:
        fetch-depth: 0

    - name: Download Packaged Artifacts
      uses: actions/download-artifact@v8.0.1
      with:
        name: release-artifacts
        path: release-artifacts

    - name: Attest Release Artifacts
      uses: actions/attest@v4.1.0
      with:
        subject-path: release-artifacts/*

    - name: Publish Immutable GitHub Prerelease
      uses: ncipollo/release-action@v1.21.0
      with:
        artifactErrorsFailBuild: true
        immutableCreate: true
        makeLatest: false
        prerelease: true
        bodyFile: release-artifacts/ReleaseNotes.md
        artifacts: "release-artifacts/*"
        tag: ${{ needs.build_package.outputs.release_tag }}
        name: ${{ needs.build_package.outputs.release_name }}
        commit: ${{ github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
